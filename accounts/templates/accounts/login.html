{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="{% static 'assets/plugins/toastr/toastr.min.css' %}"
    />
    <style>
      /* make toastr background solid (avoid transparency) */
      .toast {
        opacity: 1 !important;
      }
    </style>
  </head>
  <body class="d-flex align-items-center" style="height: 100vh">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h4 class="card-title mb-3">Sign in</h4>
              <form method="post" novalidate>
                {% csrf_token %}
                <div class="form-group">
                  <label for="username">Username</label>
                  <input
                    name="username"
                    id="username"
                    class="form-control"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="password">Password</label>
                  <input
                    name="password"
                    id="password"
                    type="password"
                    class="form-control"
                    required
                  />
                </div>
                <button class="btn btn-primary btn-block" type="submit">
                  Sign in
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{% static 'assets/plugins/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'assets/plugins/toastr/toastr.min.js' %}"></script>
    <script>
      $(function () {
        if (typeof toastr === "undefined") return;

        toastr.options = {
          closeButton: true,
          progressBar: true,
          timeOut: 2500,
          extendedTimeOut: 1500,
          positionClass: "toast-top-right",
        };

        {% if messages %}
          {% for message in messages %}
            {% with tags=message.tags %}
              {% if 'success' in tags %}
                toastr.success("{{ message|escapejs }}");
              {% elif 'error' in tags %}
                toastr.error("{{ message|escapejs }}");
              {% elif 'warning' in tags %}
                toastr.warning("{{ message|escapejs }}");
              {% else %}
                toastr.info("{{ message|escapejs }}");
              {% endif %}
            {% endwith %}
          {% endfor %}
        {% endif %}
      });
    </script>
  </body>
</html>
