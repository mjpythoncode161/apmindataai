{% extends 'base.html' %}
{% load static %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="m-0">Add User</h1>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="card card-primary card-outline">
      <div class="card-header">
        <h3 class="card-title">User</h3>
      </div>
      <form action="{% url 'add_user' %}" method="POST">
        {% csrf_token %}
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 form-group">
              <label for="full_name">Full Name</label>
              <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="contact">Contact No.</label>
              <input type="text" id="contact" name="contact" class="form-control" placeholder="Enter contact number" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="email">Email ID</label>
              <input type="email" id="email" name="email" class="form-control" placeholder="Enter email ID" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="confirm_password">Confirm Password</label>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="type">User Type</label>
              <select id="type" name="type" class="form-control" required>
                <option value="2">Customer</option>
                <option value="1">Admin</option>
                <option value="3">Account</option>
                <option value="4">Manager</option>
                <option value="5">Lead</option>
              </select>
            </div>
          </div>
        </div>
        <div class="card-footer text-center">
            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="{% url 'user_list' %}" class="btn btn-secondary">Close</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
