{% extends 'base.html' %}
{% load static %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="content-header">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-6">
        <h1 class="m-0">Edit User</h1>
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="card card-primary card-outline">
      <div class="card-header">
        <h3 class="card-title">User</h3>
      </div>
      <form action="{% url 'edit_user' user_obj.id %}" method="POST">
        {% csrf_token %}
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 form-group">
              <label for="full_name">Full Name</label>
              <input type="text" id="full_name" name="full_name" class="form-control" value="{{ user_obj.full_name }}" placeholder="Enter full name" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="contact">Contact No.</label>
              <input type="text" id="contact" name="contact" class="form-control" value="{{ user_obj.contact }}" placeholder="Enter contact number" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="email">Email ID</label>
              <input type="email" id="email" name="email" class="form-control" value="{{ user_obj.email }}" placeholder="Enter email ID" required>
            </div>
            <div class="col-md-6 form-group">
              <label for="password">Password (leave blank to keep current)</label>
              <input type="password" id="password" name="password" class="form-control" placeholder="Enter new password">
            </div>
            <div class="col-md-6 form-group">
              <label for="confirm_password">Confirm Password</label>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter new password">
            </div>
            <div class="col-md-6 form-group">
              <label for="type">User Type</label>
              <select id="type" name="type" class="form-control" required>
                <option value="2" {% if user_obj.type == 2 %}selected{% endif %}>Customer</option>
                <option value="1" {% if user_obj.type == 1 %}selected{% endif %}>Admin</option>
                <option value="3" {% if user_obj.type == 3 %}selected{% endif %}>Account</option>
                <option value="4" {% if user_obj.type == 4 %}selected{% endif %}>Manager</option>
                <option value="5" {% if user_obj.type == 5 %}selected{% endif %}>Lead</option>
              </select>
            </div>
          </div>
        </div>
        <div class="card-footer text-center">
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{% url 'user_list' %}" class="btn btn-secondary">Close</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
