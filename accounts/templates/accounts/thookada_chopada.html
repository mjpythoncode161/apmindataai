{% extends 'base.html' %}
{% load static %}

{% block title %}ತೂಕಕ್ಕಾಗಿ ಚೋಪಡಾ{% endblock %}

{% block extra_head %}
<style>
  .tc-page {
    min-height: calc(100vh - 120px);
    background: #eef1f4;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 12px;
  }
  .tc-card {
    width: 100%;
    max-width: 320px;
    background: #fff;
    border: 1px solid #b8c5d6;
    border-radius: 4px;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
    padding: 14px 16px 16px;
    font-family: 'Noto Sans Kannada', 'Nirmala UI', sans-serif;
  }
  .tc-title {
    text-align: center;
    color: #1a4fa3;
    font-size: 1.05rem;
    font-weight: 800;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .tc-field {
    width: 100%;
    height: 34px;
    border: 1px solid #7a8699;
    border-radius: 2px;
    padding: 4px 8px;
    font-size: 0.92rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #111;
  }
  .tc-lot-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tc-lot-row .tc-field {
    flex: 1;
    margin-bottom: 0;
    text-align: center;
  }
  .tc-check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 10px 0 12px;
    font-weight: 700;
    font-size: 0.9rem;
    color: #222;
  }
  .tc-check-row input {
    width: 16px;
    height: 16px;
  }
  .tc-btn {
    display: block;
    width: 100%;
    border: none;
    background: #28a745;
    color: #fff;
    font-weight: 800;
    font-size: 0.88rem;
    padding: 9px 10px;
    margin-bottom: 7px;
    border-radius: 2px;
    cursor: pointer;
    text-align: center;
    line-height: 1.25;
  }
  .tc-btn:hover {
    background: #218838;
    color: #fff;
  }
  .tc-btn:last-child { margin-bottom: 0; }
</style>
{% endblock %}

{% block content %}
<div class="tc-page">
  <div class="tc-card">
    <div class="tc-title">ತೂಕಕ್ಕಾಗಿ ಚೋಪಡಾ</div>

    <input type="date" id="tcDate" class="tc-field" value="{{ today }}" />

    <div class="tc-lot-row">
      <input type="number" id="tcFromLot" class="tc-field" value="1" min="1" placeholder="From" />
      <input type="number" id="tcToLot" class="tc-field" min="1" placeholder="To" />
    </div>

    <label class="tc-check-row">
      <input type="checkbox" id="tcMarkNeeded" checked />
      <span>Mark Needed</span>
    </label>

    <button type="button" class="tc-btn" onclick="openReport('lot')">ಲಾಟ್ ಪ್ರಕಾರ (Lot Prakara)</button>
    <button type="button" class="tc-btn" onclick="openReport('farmer')">ರೈತರ ಪ್ರಕಾರ (Rythara Prakara)</button>
    <button type="button" class="tc-btn" onclick="openReport('bill_single')">ತೂಕದ ಬಿಲ್ ಸಿಂಗಲ್ (Thookada Bill Single)</button>
    <button type="button" class="tc-btn" onclick="openReport('bill_double')">ತೂಕದ ಬಿಲ್ ಡಬಲ್ (Thookada Bill Double)</button>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function openReport(mode) {
  const d = $('#tcDate').val();
  const fromLot = $('#tcFromLot').val() || '1';
  const toLot = $('#tcToLot').val() || '';
  const mark = $('#tcMarkNeeded').is(':checked') ? '1' : '0';
  if (!d) { alert('Please select date'); return; }
  const url = '{% url "thookada_report" %}?date=' + encodeURIComponent(d)
    + '&from_lot=' + encodeURIComponent(fromLot)
    + '&to_lot=' + encodeURIComponent(toLot)
    + '&mark_needed=' + mark
    + '&mode=' + encodeURIComponent(mode);
  window.location.href = url;
}
</script>
{% endblock %}
